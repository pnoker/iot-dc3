server:
  port: ${DC3_SINGLE_PORT:8100}

spring:
  application:
    name: @project.artifactId@
  webflux:
    base-path: /single
  grpc:
    server:
      port: ${DC3_SINGLE_GRPC_PORT:9100}
  profiles:
    active:
      - ${NODE_ENV:dev}

dc3:
  data:
    point:
      batch:
        speed: ${POINT_BATCH_SPEED:100}
        interval: ${POINT_BATCH_INTERVAL:5}
  facade:
    mode: ${DC3_FACADE_MODE:local}

logging:
  file:
    name: dc3/logs/center/single/${spring.application.name}.log
