syntax = "proto3";

package api.common.driver;

import "api/common/entity.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.common.driver";
option java_outer_classname = "DriverEntityProto";
option objc_class_prefix = "Driver";
option java_multiple_files = true;

// Complete information structure submitted when a driver registers to the platform
message GrpcDriverRegisterDTO {
  // Identifier for the tenant the driver belongs to
  string tenant = 1;

  // Unique identifier for the driver service instance (service name + random node ID)
  string client = 2;

  // Basic driver property information
  GrpcDriverDTO driver = 3;

  // List of driver-supported configuration parameters
  repeated GrpcDriverAttributeDTO driver_attributes = 4;

  // List of point (tag) configuration parameters supported by the driver
  repeated GrpcPointAttributeDTO point_attributes = 5;

  // List of command configuration parameters supported by the driver
  repeated GrpcCommandAttributeDTO command_attributes = 6;

  // List of event configuration parameters supported by the driver
  repeated GrpcEventAttributeDTO event_attributes = 7;
}
