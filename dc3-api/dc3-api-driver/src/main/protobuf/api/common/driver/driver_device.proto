syntax = "proto3";

package api.common.driver;

import "api/common/page.proto";
import "api/common/r.proto";
import "api/common/entity.proto";
import "api/common/driver/driver_query.proto";
import "api/common/driver/driver_query_page.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.common.driver";
option java_outer_classname = "DriverDeviceProto";
option objc_class_prefix = "Driver";
option java_multiple_files = true;

// Service interface defining RPC calls related to driver devices
service DeviceApi {
  // Query devices with pagination
  rpc ListByPage (GrpcPageDeviceQuery) returns (GrpcRPageDeviceDTO);
  // Query device by device ID
  rpc GetById (GrpcDeviceQuery) returns (GrpcRDeviceDTO);
}

// Response wrapper for paged device query
message GrpcRPageDeviceDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Paged device data
  GrpcPageDeviceDTO data = 2;
}

// Paged device data structure
message GrpcPageDeviceDTO {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // List of devices with attachments
  repeated GrpcRDeviceAttachDTO data = 2;
}

// Response wrapper for single device query
message GrpcRDeviceDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned device attachment info
  GrpcRDeviceAttachDTO data = 2;
}

// Device attachment structure, including the device and its related configurations
message GrpcRDeviceAttachDTO {
  // Basic device information
  GrpcDeviceDTO device = 1;

  // List of point IDs associated with the device
  repeated int64 point_ids = 2;

  // Driver attribute configuration list
  repeated GrpcDriverAttributeConfigDTO driver_configs = 3;

  // Point attribute configuration list
  repeated GrpcPointAttributeConfigDTO point_configs = 4;

  // Command attribute configuration list
  repeated GrpcCommandAttributeConfigDTO command_configs = 5;

  // Event attribute configuration list
  repeated GrpcEventAttributeConfigDTO event_configs = 6;
}
