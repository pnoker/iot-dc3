syntax = "proto3";

package api.common.driver;

// Config
option java_package = "io.github.pnoker.api.common.driver";
option java_outer_classname = "QueryProto";
option objc_class_prefix = "Driver";
option java_multiple_files = true;

// Device Query
// To obtain driver information, only the driver scope is needed
// Driver query structure used to query driver-related information
message GrpcDriverQuery {
  // Driver ID
  // Identifier of the specific driver instance
  int64 driver_id = 1;
}

// Device Query
// To obtain device information in the driver, it is sufficient to limit whether the device belongs to this driver
// Device query structure used to query device-related information
message GrpcDeviceQuery {
  // Driver ID
  // Identifier of the driver to which the device belongs
  int64 driver_id = 1;

  // Device ID
  // Identifier of the specific device
  int64 device_id = 2;
}

// Point Query
// To obtain point information in the driver, it is sufficient to limit whether the point belongs to this driver
// Point query structure used to query point-related information
message GrpcPointQuery {
  // Driver ID
  // Identifier of the driver to which the point belongs
  int64 driver_id = 1;

  // Point ID
  // Identifier of the specific point
  int64 point_id = 2;
}



