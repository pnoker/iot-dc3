syntax = "proto3";

package api.common.driver;

import "api/common/page.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.common.driver";
option java_outer_classname = "QueryPageProto";
option objc_class_prefix = "Driver";
option java_multiple_files = true;

// Structure for paginated device queries
message GrpcPageDeviceQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifier of the tenant
  int64 tenant_id = 2;

  // Identifier of the driver to which the device belongs
  int64 driver_id = 3;

  // Identifier for querying a specific device
  int64 device_id = 4;
}

// Structure for paginated point queries
message GrpcPagePointQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifier of the tenant
  int64 tenant_id = 2;

  // Identifier of the driver to which the point belongs
  int64 driver_id = 3;

  // Identifier used to query points under a specific device
  int64 device_id = 4;

  // Configuration template ID used to query points under a specific profile
  int64 profile_id = 5;

  // Identifier for querying a specific point
  int64 point_id = 6;
}
