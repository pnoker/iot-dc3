syntax = "proto3";

package api.common.auth;

import "api/common/base.proto";
import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.auth";
option java_outer_classname = "UserProto";
option objc_class_prefix = "Auth";
option java_multiple_files = true;

// Service interface defining user-related RPC calls
service UserApi {
  // Query user information by user ID
  rpc GetById (GrpcIdQuery) returns (GrpcRUserDTO);

  // Query user information by principal ID
  rpc GetByPrincipalId (GrpcIdQuery) returns (GrpcRUserDTO);
}

// Request message for querying by user ID
message GrpcIdQuery {
  // User ID, unique identifier of a user
  int64 id = 1;
}

// Response wrapper for user information
message GrpcRUserDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned user data
  GrpcUserDTO data = 2;
}

// User data transfer object containing basic user information
message GrpcUserDTO {
  // Common base fields (e.g., ID, creation time, etc.)
  GrpcBase base = 1;

  // User nickname
  string nick_name = 2;

  // Username
  string user_name = 3;

  // Phone number
  string phone = 4;

  // Email
  string email = 5;

  // Social-related extension info, stored encrypted
  string social_ext = 6;

  // Identity-related extension info, stored encrypted
  string identity_ext = 7;

  // Principal ID used for authorization and audit
  int64 principal_id = 8;
}
