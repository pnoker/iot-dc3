syntax = "proto3";

package api.common.auth;

import "api/common/base.proto";
import "api/common/r.proto";

option java_package = "io.github.pnoker.api.center.auth";
option java_outer_classname = "LocalCredentialProto";
option objc_class_prefix = "Auth";
option java_multiple_files = true;

service LocalCredentialApi {
  rpc GetByLoginName (GrpcLoginNameQuery) returns (GrpcRLocalCredentialDTO);
}

message GrpcLoginNameQuery {
  string login_name = 1;
}

message GrpcRLocalCredentialDTO {
  GrpcR result = 1;
  GrpcLocalCredentialDTO data = 2;
}

message GrpcLocalCredentialDTO {
  GrpcBase base = 1;
  int64 principal_id = 2;
  string login_name = 3;
  int32 enable_flag = 4;
}
