syntax = "proto3";

package api.common.auth;

import "api/common/base.proto";
import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.auth";
option java_outer_classname = "TenantProto";
option objc_class_prefix = "Auth";
option java_multiple_files = true;

// Service interface defining tenant-related RPC calls
service TenantApi {
  // Query tenant information by tenant code
  rpc GetByCode (GrpcCodeQuery) returns (GrpcRTenantDTO);
}

// Request message for querying by tenant code
message GrpcCodeQuery {
  // Tenant code, unique identifier of a tenant
  string code = 1;
}

// Response wrapper for tenant information
message GrpcRTenantDTO {
  // Common result wrapper with status code, message, etc.
  GrpcR result = 1;

  // Returned tenant data
  GrpcTenantDTO data = 2;
}

// Tenant data structure with basic information
message GrpcTenantDTO {
  // Common base fields (e.g., ID, creation time, etc.)
  GrpcBase base = 1;

  // Tenant name
  string tenant_name = 2;

  // Tenant code, unique identifier
  string tenant_code = 3;

  // Enable flag: 1 enabled, 0 disabled
  int32 enable_flag = 4;
}