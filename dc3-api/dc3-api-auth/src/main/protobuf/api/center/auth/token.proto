syntax = "proto3";

package api.common.auth;

import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.auth";
option java_outer_classname = "TokenProto";
option objc_class_prefix = "Auth";
option java_multiple_files = true;

// Service interface defining token-related RPC calls
service TokenApi {
  // Validate token
  rpc CheckValid (GrpcLoginQuery) returns (GrpcRTokenDTO);
}

// Request message for validating login information
message GrpcLoginQuery {
  // Tenant, identifies the owning tenant
  string tenant = 1;

  // Login name
  string name = 2;

  // Salt used for password encryption
  string salt = 3;

  // Login password
  string password = 4;

  // Token
  string token = 5;
}

// Response wrapper for token validation result
message GrpcRTokenDTO {
  // Common result wrapper with status code, message, etc.
  GrpcR result = 1;

  // Returned data, typically a token or expiration time, etc.
  string data = 2;
}
