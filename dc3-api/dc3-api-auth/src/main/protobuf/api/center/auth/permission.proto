syntax = "proto3";

package api.common.auth;

import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.auth";
option java_outer_classname = "PermissionProto";
option objc_class_prefix = "Auth";
option java_multiple_files = true;

// Service interface for resolving resource permission codes by tenant and principal.
service PermissionApi {
  // List all resource codes granted to the principal in the tenant.
  rpc ListPermissionCodes (GrpcPermissionQuery) returns (GrpcRPermissionCodesDTO);
}

// Request message for permission-code lookup.
message GrpcPermissionQuery {
  // Tenant scope for role filtering.
  int64 tenant_id = 1;

  // Principal ID whose role-resource grants should be resolved.
  int64 principal_id = 2;
}

// Response wrapper for granted permission codes.
message GrpcRPermissionCodesDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Full resource codes, e.g. dc3-center-manager:device:list.
  repeated string codes = 2;
}
