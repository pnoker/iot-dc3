syntax = "proto3";

package api.common.manager;

import "api/common/page.proto";
import "api/common/r.proto";
import "api/common/entity.proto";
import "api/common/manager/manager_query.proto";
import "api/common/manager/manager_query_page.proto";

option java_package = "io.github.pnoker.api.center.manager";
option java_outer_classname = "ManagerProfileProto";
option objc_class_prefix = "Manager";
option java_multiple_files = true;

// Service interface defining RPC calls related to profile/template management
service ProfileApi {
  // Paginated query for profile/template information
  rpc ListByPage (GrpcPageProfileQuery) returns (GrpcRPageProfileDTO);
  // Query single profile/template information by Profile ID
  rpc GetByProfileId (GrpcProfileQuery) returns (GrpcRProfileDTO);
  // Batch query profile/template information by Profile IDs
  rpc ListByProfileIds (GrpcProfileIdsQuery) returns (GrpcRProfileListDTO);
  // Query profiles/templates bound to a Device ID
  rpc ListByDeviceId (GrpcDeviceQuery) returns (GrpcRProfileListDTO);
}

// Response wrapper for paginated profile query
message GrpcRPageProfileDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned paginated profile data
  GrpcPageProfileDTO data = 2;
}

// Profile page data structure
message GrpcPageProfileDTO {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // List of profile data
  repeated GrpcProfileDTO data = 2;
}

// Response wrapper for profile list query
message GrpcRProfileListDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned profile list data
  repeated GrpcProfileDTO data = 2;
}

// Response wrapper for single profile query
message GrpcRProfileDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned single profile data
  GrpcProfileDTO data = 2;
}
