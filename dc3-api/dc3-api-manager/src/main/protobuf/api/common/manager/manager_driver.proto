syntax = "proto3";

package api.common.manager;

import "api/common/r.proto";
import "api/common/page.proto";
import "api/common/entity.proto";
import "api/common/manager/manager_query.proto";
import "api/common/manager/manager_query_page.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.manager";
option java_outer_classname = "ManagerDriverProto";
option objc_class_prefix = "Manager";
option java_multiple_files = true;

// Service interface defining RPC calls related to driver management
service DriverApi {
  // Paginated query for driver information
  rpc ListByPage (GrpcPageDriverQuery) returns (GrpcRPageDriverDTO);
  // Query driver information by Driver ID
  rpc GetByDriverId (GrpcDriverQuery) returns (GrpcRDriverDTO);
  // Batch query driver information by Driver IDs
  rpc ListByDriverIds (GrpcDriverIdsQuery) returns (GrpcRDriverListDTO);
  // Query associated driver information by Device ID
  rpc GetByDeviceId (GrpcDeviceQuery) returns (GrpcRDriverDTO);
}

// Response wrapper for paginated driver query
message GrpcRPageDriverDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned paginated driver data
  GrpcPageDriverDTO data = 2;
}

// Driver page data structure
message GrpcPageDriverDTO {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // List of driver data
  repeated GrpcDriverDTO data = 2;
}

// Response wrapper for driver list query
message GrpcRDriverListDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned driver list data
  repeated GrpcDriverDTO data = 2;
}

// Response wrapper for single driver query
message GrpcRDriverDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned single driver data
  GrpcDriverDTO data = 2;
}
