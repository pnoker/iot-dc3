syntax = "proto3";

package api.common.manager;

import "api/common/page.proto";
import "api/common/r.proto";
import "api/common/entity.proto";
import "api/common/manager/manager_query.proto";
import "api/common/manager/manager_query_page.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.manager";
option java_outer_classname = "ManagerDeviceProto";
option objc_class_prefix = "Manager";
option java_multiple_files = true;

// Service interface defining RPC calls related to device management
service DeviceApi {
  // Paginated query for device information
  rpc ListByPage (GrpcPageDeviceQuery) returns (GrpcRPageDeviceDTO);
  // Query device list by Profile ID
  rpc ListByProfileId (GrpcProfileQuery) returns (GrpcRDeviceListDTO);
  // Query device list by Driver ID
  rpc ListByDriverId (GrpcDriverQuery) returns (GrpcRDeviceListDTO);
  // Query single device information by Device ID
  rpc GetByDeviceId (GrpcDeviceQuery) returns (GrpcRDeviceDTO);
  // Batch query device information by Device IDs
  rpc ListByDeviceIds (GrpcDeviceIdsQuery) returns (GrpcRDeviceListDTO);
}

// Response wrapper for paginated device query
message GrpcRPageDeviceDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned paginated device data
  GrpcPageDeviceDTO data = 2;
}

// Device page data structure
message GrpcPageDeviceDTO {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // List of device data
  repeated GrpcDeviceDTO data = 2;
}

// Response wrapper for device list query
message GrpcRDeviceListDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned device list data
  repeated GrpcDeviceDTO data = 2;
}

// Response wrapper for single device query
message GrpcRDeviceDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned single device data
  GrpcDeviceDTO data = 2;
}
