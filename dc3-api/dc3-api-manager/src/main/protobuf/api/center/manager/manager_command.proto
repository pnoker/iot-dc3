syntax = "proto3";

package api.common.manager;

import "api/common/page.proto";
import "api/common/r.proto";
import "api/common/entity.proto";
import "api/center/manager/manager_query.proto";
import "api/center/manager/manager_query_page.proto";

option java_package = "io.github.pnoker.api.center.manager";
option java_outer_classname = "ManagerCommandProto";
option objc_class_prefix = "Manager";
option java_multiple_files = true;

// Service interface defining RPC calls related to command management
service CommandApi {
  rpc ListByPage (GrpcPageCommandQuery) returns (GrpcRPageCommandDTO);
  rpc GetById (GrpcCommandQuery) returns (GrpcRCommandDTO);
  rpc ListByIds (GrpcCommandIdsQuery) returns (GrpcRCommandListDTO);
}

message GrpcRPageCommandDTO {
  GrpcR result = 1;
  GrpcPageCommandDTO data = 2;
}

message GrpcPageCommandDTO {
  GrpcPage page = 1;
  repeated GrpcCommandDTO data = 2;
}

message GrpcRCommandListDTO {
  GrpcR result = 1;
  repeated GrpcCommandDTO data = 2;
}

message GrpcRCommandDTO {
  GrpcR result = 1;
  GrpcCommandDTO data = 2;
}
