syntax = "proto3";

package api.common.manager;

import "api/common/page.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.manager";
option java_outer_classname = "ManagerQueryPageProto";
option objc_class_prefix = "Manager";
option java_multiple_files = true;

// Driver pagination query structure, used for paginated query of driver information
message GrpcPageDriverQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifies the tenant
  int64 tenant_id = 2;

  // Filter conditions for driver information query
  // Driver name for fuzzy query
  string driver_name = 3;

  // Driver code, unique identifier
  string driver_code = 4;

  // Driver service name, identifies service type
  string service_name = 5;

  // Service host, identifies service deployment location
  string service_host = 6;

  // Driver type flag, distinguishes different types of drivers
  int32 driver_type_flag = 7;

  // Enable flag: 0 for enabled, 1 for disabled, -1 for unset
  int32 enable_flag = 8;

  // Version number for version management
  int32 version = 9;
}

// Point pagination query structure, used for paginated query of point information
message GrpcPagePointQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifies the tenant
  int64 tenant_id = 2;

  // Filter conditions for point information query
  // Point name for fuzzy query
  string point_name = 3;

  // Point code, unique identifier
  string point_code = 4;

  // Point type flag, distinguishes different types of points
  int32 point_type_flag = 5;

  // Read/write flag, indicates point read/write permissions
  int32 rw_flag = 6;

  // Profile template ID, associates configuration template
  int64 profile_id = 7;

  // Group ID for point group management
  int64 group_id = 8;

  // Enable flag: 0 for enabled, 1 for disabled, -1 for unset
  int32 enable_flag = 9;

  // Version number for version management
  int32 version = 10;

  // Extra query conditions
  // Device ID for querying points under specific device
  int64 device_id = 11;
}

// Device pagination query structure, used for paginated query of device information
message GrpcPageDeviceQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifies the tenant
  int64 tenant_id = 2;

  // Filter conditions for device information query
  // Device name for fuzzy query
  string device_name = 3;

  // Device code, unique identifier
  string device_code = 4;

  // Driver ID, associates device with driver
  int64 driver_id = 5;

  // Group ID for device group management
  int64 group_id = 6;

  // Enable flag: 0 for enabled, 1 for disabled, -1 for unset
  int32 enable_flag = 7;

  // Version number for version management
  int32 version = 8;

  // Extra query conditions
  // Profile template ID for querying devices under specific template
  int64 profile_id = 9;
}

// Profile pagination query structure, used for paginated query of profile/template information
message GrpcPageProfileQuery {
  // Pagination information including page number, page size, and total count
  GrpcPage page = 1;

  // Identifies the tenant
  int64 tenant_id = 2;

  // Profile/template name for fuzzy query
  string profile_name = 3;

  // Profile/template code, unique identifier
  string profile_code = 4;

  // Profile share flag
  int32 profile_share_flag = 5;

  // Profile type flag
  int32 profile_type_flag = 6;

  // Enable flag: 0 for enabled, 1 for disabled, -1 for unset
  int32 enable_flag = 7;

  // Version number for version management
  int32 version = 8;

  // Device ID for querying templates bound to a specific device
  int64 device_id = 9;
}

// Command pagination query structure
message GrpcPageCommandQuery {
  GrpcPage page = 1;
  int64 tenant_id = 2;
  string command_name = 3;
  string command_code = 4;
  int32 command_type_flag = 5;
  int32 call_type_flag = 6;
  int64 profile_id = 7;
  int32 enable_flag = 8;
  int32 version = 9;
  int64 device_id = 10;
}

// Event pagination query structure
message GrpcPageEventQuery {
  GrpcPage page = 1;
  int64 tenant_id = 2;
  string event_name = 3;
  string event_code = 4;
  int32 event_type_flag = 5;
  int32 event_level_flag = 6;
  int64 profile_id = 7;
  int32 enable_flag = 8;
  int32 version = 9;
  int64 device_id = 10;
}
