syntax = "proto3";

package api.common.data;

import "api/common/r.proto";
import "api/common/page.proto";

option java_package = "io.github.pnoker.api.center.data";
option java_outer_classname = "CommandHistoryProto";
option objc_class_prefix = "Data";
option java_multiple_files = true;

service CommandHistoryApi {
  rpc CallCommand (GrpcCommandCallVO) returns (GrpcRString);
  rpc GetByRecordId (GrpcStringQuery) returns (GrpcRCommandHistoryDTO);
  rpc ListByPage (GrpcCommandHistoryQuery) returns (GrpcRPageCommandHistoryDTO);
}

message GrpcCommandCallVO {
  int64 device_id = 1;
  int64 command_id = 2;
  map<string, string> param_values = 3;
  int64 tenant_id = 4;
}

message GrpcCommandHistoryDTO {
  int64 id = 1;
  string record_id = 2;
  int64 tenant_id = 3;
  int64 device_id = 4;
  int64 command_id = 5;
  string command_code = 6;
  map<string, string> param_values = 7;
  map<string, string> result_values = 8;
  string status = 9;
  string error_code = 10;
  string error_message = 11;
  string source = 12;
  int64 source_user_id = 13;
  int64 occur_time = 14;
  int64 send_time = 15;
  int64 finish_time = 16;
  int32 schema_version = 17;
  int64 create_time = 18;
  int64 operate_time = 19;
  int64 expire_time = 20;
  string config_snapshot = 21;
}

message GrpcCommandHistoryQuery {
  int64 device_id = 1;
  int64 command_id = 2;
  string status = 3;
  int64 tenant_id = 4;
  GrpcPage page = 5;
}

message GrpcRCommandHistoryDTO {
  GrpcR result = 1;
  GrpcCommandHistoryDTO data = 2;
}

message GrpcPageCommandHistoryDTO {
  GrpcPage page = 1;
  repeated GrpcCommandHistoryDTO data = 2;
}

message GrpcRPageCommandHistoryDTO {
  GrpcR result = 1;
  GrpcPageCommandHistoryDTO data = 2;
}

message GrpcStringQuery {
  string value = 1;
}

message GrpcRString {
  GrpcR result = 1;
  string data = 2;
}
