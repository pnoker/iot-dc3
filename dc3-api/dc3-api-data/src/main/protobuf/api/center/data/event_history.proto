syntax = "proto3";

package api.common.data;

import "api/common/r.proto";
import "api/common/page.proto";
import "api/center/data/command_history.proto";

option java_package = "io.github.pnoker.api.center.data";
option java_outer_classname = "EventHistoryProto";
option objc_class_prefix = "Data";
option java_multiple_files = true;

service EventHistoryApi {
  rpc Report (GrpcEventReportVO) returns (GrpcRString);
  rpc GetByRecordId (GrpcStringQuery) returns (GrpcREventHistoryDTO);
  rpc List (GrpcEventHistoryQuery) returns (GrpcRPageEventHistoryDTO);
}

message GrpcEventReportVO {
  int64 device_id = 1;
  int64 event_id = 2;
  map<string, string> param_values = 3;
  string message = 4;
  int64 tenant_id = 5;
}

message GrpcEventHistoryDTO {
  int64 id = 1;
  string record_id = 2;
  int64 tenant_id = 3;
  int64 device_id = 4;
  int64 event_id = 5;
  string event_code = 6;
  int32 event_type_flag = 7;
  int32 event_level_flag = 8;
  map<string, string> param_values = 9;
  string message = 10;
  int64 occur_time = 11;
  int64 receive_time = 12;
  int32 acknowledge_flag = 13;
  int32 schema_version = 14;
  int64 create_time = 15;
  int64 operate_time = 16;
  int64 acknowledge_time = 17;
  int64 acknowledge_user_id = 18;
  string config_snapshot = 19;
}

message GrpcEventHistoryQuery {
  int64 device_id = 1;
  int64 event_id = 2;
  int32 event_type_flag = 3;
  int64 tenant_id = 4;
  GrpcPage page = 5;
}

message GrpcREventHistoryDTO {
  GrpcR result = 1;
  GrpcEventHistoryDTO data = 2;
}

message GrpcPageEventHistoryDTO {
  GrpcPage page = 1;
  repeated GrpcEventHistoryDTO data = 2;
}

message GrpcRPageEventHistoryDTO {
  GrpcR result = 1;
  GrpcPageEventHistoryDTO data = 2;
}
