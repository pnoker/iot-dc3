syntax = "proto3";

package api.common.data;

import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.data";
option java_outer_classname = "PointValueProto";
option objc_class_prefix = "Data";
option java_multiple_files = true;

// Service interface defining RPC calls related to point values
service PointValueApi {
  // Query the latest collected value of a device point
  rpc GetLastValue (GrpcPointValueQuery) returns (GrpcRPointValueDTO);

  // Query historical values of a device point
  rpc ListHistoryValues (GrpcPointValueHistoryQuery) returns (GrpcRPointValueStringList);

  // Send a read command to a device for a specific point
  rpc ReadCommand (GrpcPointValueCommandQuery) returns (GrpcRBoolean);

  // Send a write command to a device for a specific point
  rpc WriteCommand (GrpcPointValueWriteCommand) returns (GrpcRBoolean);
}

// Request structure for querying a single point value
message GrpcPointValueQuery {
  // Device ID
  int64 device_id = 1;

  // Point ID
  int64 point_id = 2;

  // Tenant ID
  int64 tenant_id = 3;
}

// Response wrapper for single point value query
message GrpcRPointValueDTO {
  // Common result wrapper
  GrpcR result = 1;

  // Point value data
  GrpcPointValueDTO data = 2;
}

// Point value data structure
message GrpcPointValueDTO {
  // Record ID
  int64 id = 1;

  // Device ID
  int64 device_id = 2;

  // Point ID
  int64 point_id = 3;

  // Processed value
  string value = 4;

  // Raw value from device
  string raw_value = 5;

  // Storage timestamp
  int64 create_time = 6;

  // Numeric projection of value; populated when value parses cleanly as a double
  double num_value = 7;
}

// Request structure for querying historical point values
message GrpcPointValueHistoryQuery {
  // Device ID
  int64 device_id = 1;

  // Point ID
  int64 point_id = 2;

  // Tenant ID
  int64 tenant_id = 3;

  // Number of records to retrieve
  int32 count = 4;
}

// Response wrapper for historical values (list of raw value strings)
message GrpcRPointValueStringList {
  // Common result wrapper
  GrpcR result = 1;

  // List of historical value strings
  repeated string data = 2;
}

// Request structure for sending a read command
message GrpcPointValueCommandQuery {
  // Device ID
  int64 device_id = 1;

  // Point ID
  int64 point_id = 2;

  // Tenant ID
  int64 tenant_id = 3;
}

// Request structure for sending a write command
message GrpcPointValueWriteCommand {
  // Device ID
  int64 device_id = 1;

  // Point ID
  int64 point_id = 2;

  // Value to write
  string value = 3;

  // Tenant ID
  int64 tenant_id = 4;
}

// Generic boolean response wrapper
message GrpcRBoolean {
  // Common result wrapper
  GrpcR result = 1;

  // Response data (true/false)
  bool data = 2;
}
