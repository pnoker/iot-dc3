syntax = "proto3";

package api.common.data;

import "api/common/r.proto";

// Configuration options for code generation
option java_package = "io.github.pnoker.api.center.data";
option java_outer_classname = "PointValueProto";
option objc_class_prefix = "Data";
option java_multiple_files = true;

// Service interface defining RPC calls related to point values
service PointValueApi {
  // Query the latest collected value of a device point
  rpc LastValue (GrpcPointValueQuery) returns (GrpcRPointValueDTO);
}

// Request structure for querying point values
message GrpcPointValueQuery {
  // Device ID, identifies the specific device
  int64 device_id = 1;
  
  // Point ID, identifies the specific point
  int64 point_id = 2;

  // Identifies the tenant to which the data belongs
  int64 tenant_id = 3;
}

// Response wrapper for point value query
message GrpcRPointValueDTO {
  // Common result wrapper containing status code, message, etc.
  GrpcR result = 1;

  // Returned point value data
  GrpcPointValueDTO data = 2;
}

// Point value data structure containing collected data for a point
message GrpcPointValueDTO {
  // Point value record ID
  int64 id = 1;

  // Device ID, identifies the source device
  int64 device_id = 2;

  // Point ID, identifies the specific point
  int64 point_id = 3;

  // Processed value, after data conversion and formatting
  string value = 4;

  // Raw value, directly collected from the device
  string raw_value = 5;

  // Storage time, the timestamp when the data is stored in the database
  int64 create_time = 6;
}