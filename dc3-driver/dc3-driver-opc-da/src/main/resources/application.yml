dc3:
  driver:
    tenant: default
    name: OPC DA Driver
    code: OpcDaDriver
    type: DRIVER_CLIENT
    remark: @project.description@
    schedule:
      # Read data regularly
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout-seconds: 45
    driver-attribute:
      - attribute-name: Host
        attribute-code: host
        attribute-type-flag: STRING
        default-value: localhost
        remark: OPC DA host
      - attribute-name: CLSID
        attribute-code: clsId
        attribute-type-flag: STRING
        default-value: F8582CF2-88FB-11D0-B850-00C0F0104305
        remark: OPC DA server CLSID
      - attribute-name: Username
        attribute-code: username
        attribute-type-flag: STRING
        default-value: dc3
        remark: OPC DA username
      - attribute-name: Password
        attribute-code: password
        attribute-type-flag: STRING
        default-value: dc3dc3
        remark: OPC DA password
    point-attribute:
      - attribute-name: Group
        attribute-code: group
        attribute-type-flag: STRING
        default-value: GROUP
        remark: OPC DA item group name
      - attribute-name: Tag
        attribute-code: tag
        attribute-type-flag: STRING
        default-value: TAG
        remark: OPC DA item tag name

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/opc-da/${spring.application.name}.log
