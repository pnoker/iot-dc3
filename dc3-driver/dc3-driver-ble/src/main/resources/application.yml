dc3:
  driver:
    tenant: default
    name: Bluetooth LE Driver
    code: BleDriver
    type: DRIVER_CLIENT
    remark: @project.description@
    schedule:
      # Read data regularly
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout: 45
        timeout-unit: SECONDS
    driver-attribute:
      - attribute-name: Adapter Name
        attribute-code: adapterName
        attribute-type-flag: STRING
        default-value: hci0
        remark: Bluetooth adapter name
      - attribute-name: Device Address
        attribute-code: deviceAddress
        attribute-type-flag: STRING
        default-value: ''
        remark: BLE device MAC address (e.g. AA:BB:CC:DD:EE:FF)
      - attribute-name: Connection Timeout
        attribute-code: connectionTimeout
        attribute-type-flag: INT
        default-value: 10000
        remark: Connection timeout in milliseconds
    point-attribute:
      - attribute-name: Service UUID
        attribute-code: serviceUuid
        attribute-type-flag: STRING
        default-value: ''
        remark: GATT Service UUID
      - attribute-name: Characteristic UUID
        attribute-code: characteristicUuid
        attribute-type-flag: STRING
        default-value: ''
        remark: GATT Characteristic UUID
      - attribute-name: Read Format
        attribute-code: readFormat
        attribute-type-flag: STRING
        default-value: UTF8
        remark: Data format (UTF8, HEX, INT16, UINT16, FLOAT)
      - attribute-name: Byte Order
        attribute-code: byteOrder
        attribute-type-flag: STRING
        default-value: BIG
        remark: Byte order (BIG, LITTLE)
    command-attribute:
      - attribute-name: Service UUID
        attribute-code: serviceUuid
        attribute-type-flag: STRING
        default-value: ''
        remark: GATT Service UUID
      - attribute-name: Characteristic UUID
        attribute-code: characteristicUuid
        attribute-type-flag: STRING
        default-value: ''
        remark: GATT Characteristic UUID for writing

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/ble/${spring.application.name}.log
