dc3:
  driver:
    tenant: default
    name: CoAP Driver
    code: CoapDriver
    type: DRIVER_SERVER
    remark: @project.description@
    schedule:
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout-seconds: 45
    driver-attribute:
      - attribute-name: Device Host
        attribute-code: deviceHost
        attribute-type-flag: STRING
        default-value: localhost
        remark: CoAP device host address
      - attribute-name: Device Port
        attribute-code: devicePort
        attribute-type-flag: INT
        default-value: 5683
        remark: CoAP device port
    point-attribute:
      - attribute-name: Read Path
        attribute-code: readPath
        attribute-type-flag: STRING
        default-value: /sensors
        remark: CoAP resource path for reading point data
      - attribute-name: Write Path
        attribute-code: writePath
        attribute-type-flag: STRING
        default-value: /actuators
        remark: CoAP resource path for writing point data
      - attribute-name: Content Format
        attribute-code: contentFormat
        attribute-type-flag: STRING
        default-value: json
        remark:
          Content format: json, text, cbor, octet-stream

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/coap/${spring.application.name}.log
