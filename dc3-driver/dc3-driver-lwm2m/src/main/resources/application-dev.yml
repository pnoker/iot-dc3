# Development environment configuration will overwrite the content configured in application-*.yml
dc3:
  driver:
    schedule:
      read:
        cron: '0/5 * * * * ?'
    lwm2m:
      server-host: ${LWM2M_SERVER_HOST:0.0.0.0}
      server-port: ${LWM2M_SERVER_PORT:5683}
      secure-port: ${LWM2M_SECURE_PORT:5684}
      security-mode: ${LWM2M_SECURITY_MODE:NOSEC}

spring:
  env: dev
  group: ${user.name}
  rabbitmq:
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:dc3}
    host: ${RABBITMQ_HOST:dc3-rabbitmq}
    port: ${RABBITMQ_PORT:35672}
    username: ${RABBITMQ_USERNAME:dc3}
    password: ${RABBITMQ_PASSWORD:}

logging:
  level:
    io.github.pnoker: DEBUG
    io.github.pnoker.driver.sdk: DEBUG
    org.eclipse.leshan: INFO
    org.eclipse.californium: INFO
