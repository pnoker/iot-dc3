dc3:
  driver:
    tenant: default
    name: PostgreSQL Driver
    code: PostgresqlDriver
    type: DRIVER_CLIENT
    remark: @project.description@
    schedule:
      # Read data regularly
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout: 45
        timeout-unit: SECONDS
    driver-attribute:
      - attribute-name: Host
        attribute-code: host
        attribute-type-flag: STRING
        default-value: localhost
        remark: PostgreSQL host
      - attribute-name: Port
        attribute-code: port
        attribute-type-flag: INT
        default-value: 5432
        remark: PostgreSQL port
      - attribute-name: Database
        attribute-code: database
        attribute-type-flag: STRING
        default-value:
        remark: PostgreSQL database name
      - attribute-name: Username
        attribute-code: username
        attribute-type-flag: STRING
        default-value: root
        remark: PostgreSQL username
      - attribute-name: Password
        attribute-code: password
        attribute-type-flag: STRING
        default-value:
        remark: PostgreSQL password
      - attribute-name: Query Timeout
        attribute-code: queryTimeout
        attribute-type-flag: INT
        default-value: 30
        remark: SQL query timeout in seconds
    point-attribute:
      - attribute-name: Read Query
        attribute-code: readQuery
        attribute-type-flag: STRING
        default-value:
        remark: SQL SELECT query for reading point value
      - attribute-name: Write Query
        attribute-code: writeQuery
        attribute-type-flag: STRING
        default-value:
        remark: SQL UPDATE/INSERT query for writing point value
    command-attribute:
      - attribute-name: Execute Query
        attribute-code: executeQuery
        attribute-type-flag: STRING
        default-value:
        remark: SQL query to execute for command

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/postgresql/${spring.application.name}.log
