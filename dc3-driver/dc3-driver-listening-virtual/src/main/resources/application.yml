dc3:
  driver:
    tenant: default
    name: Listening Virtual TCP/UDP Driver
    code: ListeningVirtualDriver
    type: DRIVER_SERVER
    remark: @project.description@
    custom:
      tcp:
        port: ${TCP_PORT:6270}
      udp:
        port: ${UDP_PORT:6271}
    schedule:
      # Read data regularly
      read:
        enable: false
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout-seconds: 45
    point-attribute:
      - attribute-name: Keyword
        attribute-code: key
        attribute-type-flag: STRING
        default-value: 62
        remark: Packet identification keyword
      - attribute-name: Start Byte
        attribute-code: start
        attribute-type-flag: INT
        default-value: 0
        remark: Inclusive start byte offset
      - attribute-name: End Byte
        attribute-code: end
        attribute-type-flag: INT
        default-value: 8
        remark: Exclusive end byte offset
      - attribute-name: Type
        attribute-code: type
        attribute-type-flag: STRING
        default-value: string
        remark: Parse type, short, int, long, float, double, boolean, string

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/listening-virtual/${spring.application.name}.log
