dc3:
  driver:
    tenant: default
    name: Serial Port Driver
    code: SerialDriver
    type: DRIVER_CLIENT
    remark: @project.description@
    schedule:
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout: 45
        timeout-unit: SECONDS
    driver-attribute:
      - attribute-name: Serial Port
        attribute-code: port
        attribute-type-flag: STRING
        default-value: /dev/ttyUSB0
        remark: Serial port device path
      - attribute-name: Baud Rate
        attribute-code: baudRate
        attribute-type-flag: INT
        default-value: 9600
        remark: Baud rate (1200, 2400, 4800, 9600, 19200, 38400, 57600, 115200)
      - attribute-name: Data Bits
        attribute-code: dataBits
        attribute-type-flag: INT
        default-value: 8
        remark: Data bits (5, 6, 7, 8)
      - attribute-name: Stop Bits
        attribute-code: stopBits
        attribute-type-flag: INT
        default-value: 1
        remark: Stop bits (1, 2)
      - attribute-name: Parity
        attribute-code: parity
        attribute-type-flag: INT
        default-value: 0
        remark: Parity (0=None, 1=Odd, 2=Even)
      - attribute-name: Timeout
        attribute-code: timeout
        attribute-type-flag: INT
        default-value: 1000
        remark: Read timeout in milliseconds
    point-attribute:
      - attribute-name: Send Command
        attribute-code: sendCommand
        attribute-type-flag: STRING
        default-value: ''
        remark: HEX command to send (e.g. 01 03 00 00 00 0A C5 CD)
      - attribute-name: Receive Length
        attribute-code: receiveLength
        attribute-type-flag: INT
        default-value: 0
        remark: Expected response length in bytes (0=auto detect)
      - attribute-name: Frame Header
        attribute-code: frameHeader
        attribute-type-flag: STRING
        default-value: ''
        remark: Frame header in HEX (e.g. 01 03)
      - attribute-name: Frame Footer
        attribute-code: frameFooter
        attribute-type-flag: STRING
        default-value: ''
        remark: Frame footer in HEX (e.g. 0D 0A)
      - attribute-name: Data Offset
        attribute-code: dataOffset
        attribute-type-flag: INT
        default-value: 0
        remark: Data region offset from frame start
      - attribute-name: Data Length
        attribute-code: dataLength
        attribute-type-flag: INT
        default-value: 0
        remark: Data region length in bytes (0=until frame footer)
      - attribute-name: Checksum Type
        attribute-code: checksumType
        attribute-type-flag: STRING
        default-value: NONE
        remark: Checksum type: NONE, CRC16, XOR
      - attribute-name: Data Format
        attribute-code: dataFormat
        attribute-type-flag: STRING
        default-value: HEX
        remark: Data format: HEX, ASCII, BINARY, FLOAT
      - attribute-name: Byte Order
        attribute-code: byteOrder
        attribute-type-flag: STRING
        default-value: BIG
        remark: Byte order: BIG, LITTLE
    command-attribute:
      - attribute-name: Send Command
        attribute-code: sendCommand
        attribute-type-flag: STRING
        default-value: '${value}'
        remark: HEX command template with ${value} placeholder
      - attribute-name: Byte Order
        attribute-code: byteOrder
        attribute-type-flag: STRING
        default-value: BIG
        remark: Byte order for encoding value: BIG, LITTLE

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/serial/${spring.application.name}.log
