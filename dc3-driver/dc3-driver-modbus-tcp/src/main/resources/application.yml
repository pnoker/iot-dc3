dc3:
  driver:
    tenant: default
    name: Modbus TCP Driver
    code: ModbusTcpDriver
    type: DRIVER_CLIENT
    remark: @project.description@
    schedule:
      # Read data regularly
      read:
        enable: true
        cron: '0/30 * * * * ?'
      custom:
        enable: true
        cron: '0/5 * * * * ?'
    health:
      device:
        enable: true
        cron: '0/15 * * * * ?'
        timeout-seconds: 45
    driver-attribute:
      - attribute-name: Host
        attribute-code: host
        attribute-type-flag: STRING
        default-value: localhost
        remark: Modbus IP
      - attribute-name: Port
        attribute-code: port
        attribute-type-flag: INT
        default-value: 502
        remark: Modbus Port
    point-attribute:
      - attribute-name: Slave ID
        attribute-code: slaveId
        attribute-type-flag: INT
        default-value: 1
        remark: Modbus slave unit ID
      - attribute-name: Function Code
        attribute-code: functionCode
        attribute-type-flag: INT
        default-value: 1
        remark: Modbus function code [1, 2, 3, 4]
      - attribute-name: Offset
        attribute-code: offset
        attribute-type-flag: INT
        default-value: 0
        remark: Register or coil address offset

spring:
  application:
    name: @project.artifactId@
  profiles:
    active:
      - ${NODE_ENV:dev}

logging:
  file:
    name: dc3/logs/driver/modbus-tcp/${spring.application.name}.log
