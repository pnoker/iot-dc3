# Agentic module defaults loaded when the "agentic" Spring profile is active.
# These can be overridden in the center service's own application.yml.

spring:
  ai:
    openai:
      # Used only by Spring AI's fallback ChatClient when no database model/provider matches.
      # Normal Agentic provider credentials are loaded from dc3_model_provider.
      base-url: ${AGENTIC_FALLBACK_OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${AGENTIC_FALLBACK_OPENAI_API_KEY:}
      chat:
        options:
          model: ${AGENTIC_FALLBACK_OPENAI_MODEL:gpt-4o}
          temperature: ${AGENTIC_FALLBACK_OPENAI_TEMPERATURE:0.7}
          max-tokens: ${AGENTIC_FALLBACK_OPENAI_MAX_TOKENS:2048}
        memory:
          repository:
            jdbc:
              initialize-schema: ${AGENTIC_MEMORY_SCHEMA_INIT:never}

dc3:
  agentic:
    enabled: true
    memory-enabled: ${AGENTIC_MEMORY_ENABLED:false}
    tool-calling-enabled: ${AGENTIC_TOOL_CALLING_ENABLED:false}
    memory-max-messages: ${AGENTIC_MEMORY_MAX_MESSAGES:50}
    attachment-storage-path: ${AGENTIC_ATTACHMENT_STORAGE_PATH:dc3/data/agentic/attachments}
