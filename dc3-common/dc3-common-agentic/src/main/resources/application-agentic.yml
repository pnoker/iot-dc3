# Agentic module defaults — imported as a Spring profile via AgenticAutoConfiguration.
# These can be overridden in the center service's own application.yml.

spring:
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:deepseek-v4-pro}
          temperature: ${OPENAI_TEMPERATURE:0.7}
          max-tokens: ${OPENAI_MAX_TOKENS:2048}
        memory:
          repository:
            jdbc:
              initialize-schema: ${AGENTIC_MEMORY_SCHEMA_INIT:never}

dc3:
  agentic:
    enabled: true
    memory-enabled: ${AGENTIC_MEMORY_ENABLED:false}
    tool-calling-enabled: ${AGENTIC_TOOL_CALLING_ENABLED:false}
    memory-max-messages: ${AGENTIC_MEMORY_MAX_MESSAGES:50}
    attachment-storage-path: ${AGENTIC_ATTACHMENT_STORAGE_PATH:dc3/data/agentic/attachments}
