name: device-query
description: "Device, driver, and point query capability"
enabled: true
system-prompt-addition: |
  When the user asks for device information, prefer lookupDeviceById or searchDevices.
  Present key fields such as ID, name, code, and status in a table.
tools:
  - lookupDeviceById
  - lookupDevicesByIds
  - searchDevices
  - listDevicesByDriverId
  - listDevicesByProfileId
  - lookupDriverById
  - lookupDriversByIds
  - lookupDriverByDeviceId
  - searchDrivers
  - lookupPointById
  - lookupPointsByIds
  - searchPoints
  - listPointsByDeviceId
  - listPointsByProfileId
  - lookupProfileById
  - lookupProfilesByIds
  - searchProfiles
  - listProfilesByDeviceId
  - getDeviceStatusesByIds
  - getDeviceStatusesByProfileId
  - getDriverStatusesByIds
  - getDriverDeviceStatusSummary
  - getSystemHealth
examples:
  - user: "Show devices under driver 1"
    assistant: "Querying the device list under driver 1..."
