name: data-monitor
description: "Data reading and monitoring capability"
enabled: true
system-prompt-addition: |
  When the user needs device data, use getLatestPointValue for real-time values and getPointValueHistory for historical trends.
  Include timestamps and unit information when presenting data.
tools:
  - listPointsByDeviceId
  - listPointsByProfileId
  - lookupDevicesByIds
  - lookupPointsByIds
  - getLatestPointValue
  - getDeviceLatestPointValues
  - getPointValueHistory
  - getDeviceStatusesByIds
  - getDeviceStatusesByProfileId
  - getDriverStatusesByIds
  - getDriverDeviceStatusSummary
  - getSystemHealth
examples:
  - user: "Show the latest data for device 1"
    assistant: "Show the device, point, value, timestamp, and unit returned by the backend."
