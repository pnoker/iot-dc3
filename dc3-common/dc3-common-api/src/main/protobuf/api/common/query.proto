syntax = "proto3";

package api.common;

// Config
option java_package = "io.github.pnoker.api.common";
option java_outer_classname = "QueryProto";
option objc_class_prefix = "Common";
option java_multiple_files = true;

// Driver query structure used to query driver-related information
message GrpcDriverQuery {
  // Identifies specific driver instance
  int64 driver_id = 1;

  // Identifies the tenant
  int64 tenant_id = 2;
}
