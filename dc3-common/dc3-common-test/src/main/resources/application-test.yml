# Shared application profile for unit, slice and integration tests.
# Imported by other modules via spring.profiles.active=test.

spring:
  main:
    banner-mode: off
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
  cache:
    type: simple
  task:
    scheduling:
      pool:
        size: 1

management:
  endpoints:
    enabled-by-default: false
  health:
    defaults:
      enabled: false

logging:
  level:
    root: WARN
    io.github.pnoker: INFO
    org.testcontainers: WARN
    com.github.dockerjava: WARN
    org.springframework: WARN
    org.springframework.test: INFO
    org.hibernate.validator: WARN
    com.zaxxer.hikari: WARN
