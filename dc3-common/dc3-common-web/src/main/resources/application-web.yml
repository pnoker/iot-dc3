# Global default web configuration.
# These properties can be overridden in environment-specific files:
# application-dev.yml, application-test.yml, application-pre.yml, application-pro.yml.
# Property values in environment-specific files take precedence over these defaults.
spring:
  transaction:
    # Enable rollback if a failure occurs during transaction commit.
    rollback-on-commit-failure: true
  main:
  web:
    resources:
      # Disable Spring Boot's default static resource mappings.
      # Resource handling should be customized by the application if required.
      add-mappings: false
  jackson:
    deserialization:
      # Do not fail when encountering unknown properties during JSON deserialization.
      fail-on-unknown-properties: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        # Expose health and Prometheus endpoints for readiness and metrics scraping.
        include: health,prometheus
