# Global default web configuration.
# The following properties can be overridden in environment-specific files:
# application-dev.yml, application-test.yml, application-pre.yml, application-pro.yml.
# If the same property exists in those files, their values will take precedence.
spring:
  transaction:
    # Enable rollback when a failure happens at transaction commit time.
    rollback-on-commit-failure: true
  main:
    # Allow bean definition overriding between different auto-configurations or modules.
    allow-bean-definition-overriding: true
  web:
    resources:
      # Disable default static resource mappings provided by Spring Boot.
      # Static resource handling will be customized by the application if needed.
      add-mappings: false

management:
  endpoints:
    web:
      exposure:
        # Expose the Prometheus actuator endpoint for metrics scraping.
        include: prometheus