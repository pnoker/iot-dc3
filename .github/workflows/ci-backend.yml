name: Backend CI

on:
  push:
    branches: [ develop, main ]
    paths-ignore:
      - dc3-web/**
  pull_request:
    branches: [ develop, main ]
    paths-ignore:
      - dc3-web/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: liberica
          java-version: 21
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Audit controller permissions
        run: python3 dc3/bin/audit_controller_permissions.py

      - name: Compile
        run: |
          set -euo pipefail
          mvn -U -e -B -DskipTests compile --no-transfer-progress
