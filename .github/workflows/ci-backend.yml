name: Backend CI

on:
  push:
    branches: [ develop, main ]
    paths-ignore:
      - dc3-web/**
  pull_request:
    branches: [ develop, main ]
    paths-ignore:
      - dc3-web/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: liberica
          java-version: 21
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Audit controller permissions
        run: python3 dc3/bin/audit_controller_permissions.py

      - name: Compile
        run: |
          set -euo pipefail
          mvn -U -e -B -DskipTests compile --no-transfer-progress
