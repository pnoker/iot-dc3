name: Docker Image

on:
  push:
    tags:
      - dc3.release.*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  PROFILE: pro
  DOCKER_REGISTRY_DEFAULT: pnoker
  DOCKER_REGISTRY_ALIYUN: registry.cn-beijing.aliyuncs.com/dc3

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 25
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Extract variables
        id: variables
        run: |
          set -euo pipefail
          VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "service_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: |
          set -euo pipefail
          mvn -U -e -B clean package -DskipTests -P "$PROFILE" --no-transfer-progress

      - name: Set Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login Docker Default Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login Docker Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ vars.ALIYUN_DOCKERHUB_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKERHUB_TOKEN }}

      - name: Build and push all images
        env:
          SERVICE_VERSION: ${{ steps.variables.outputs.service_version }}
        run: |
          set -euo pipefail

          services=(
            "dc3-gateway:dc3-gateway"
            "dc3-center-auth:dc3-center/dc3-center-auth"
            "dc3-center-data:dc3-center/dc3-center-data"
            "dc3-center-manager:dc3-center/dc3-center-manager"
            "dc3-center-single:dc3-center/dc3-center-single"
            "dc3-driver-listening-virtual:dc3-driver/dc3-driver-listening-virtual"
            "dc3-driver-modbus-tcp:dc3-driver/dc3-driver-modbus-tcp"
            "dc3-driver-mqtt:dc3-driver/dc3-driver-mqtt"
            "dc3-driver-opc-da:dc3-driver/dc3-driver-opc-da"
            "dc3-driver-opc-ua:dc3-driver/dc3-driver-opc-ua"
            "dc3-driver-plcs7:dc3-driver/dc3-driver-plcs7"
            "dc3-driver-virtual:dc3-driver/dc3-driver-virtual"
          )

          for item in "${services[@]}"; do
            name="${item%%:*}"
            path="${item##*:}"

            echo "Building and pushing: $name"
            docker buildx build \
              --platform linux/arm64,linux/amd64 \
              --file "$path/Dockerfile" \
              --push \
              --tag "$DOCKER_REGISTRY_DEFAULT/$name:latest" \
              --tag "$DOCKER_REGISTRY_DEFAULT/$name:$SERVICE_VERSION" \
              --tag "$DOCKER_REGISTRY_ALIYUN/$name:latest" \
              --tag "$DOCKER_REGISTRY_ALIYUN/$name:$SERVICE_VERSION" \
              "$path"
          done

  release:
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 25
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Extract variables
        id: variables
        run: |
          set -euo pipefail
          VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "service_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        env:
          SERVICE_VERSION: ${{ steps.variables.outputs.service_version }}
          SERVICE_WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail

          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          envsubst < "$SERVICE_WORKSPACE/dc3/doc/TITLE.md" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          envsubst < "$SERVICE_WORKSPACE/dc3/doc/CHANGE.md" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          envsubst < "$SERVICE_WORKSPACE/dc3/doc/USAGE.md" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.variables.outputs.service_version }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
