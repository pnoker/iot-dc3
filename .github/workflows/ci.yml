name: CI

on:
  push:
    branches: [ develop, release, main ]
  pull_request:
    branches: [ develop, release, main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_SETTINGS: .mvn/settings.xml

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 21
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Compile
        run: |
          set -euo pipefail
          mvn -s "$MAVEN_SETTINGS" -U -e -B -DskipTests compile --no-transfer-progress
