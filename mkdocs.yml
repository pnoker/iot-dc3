site_name: IoT DC3
site_description: 基于 Spring Cloud 的开源分布式物联网平台
site_url: https://pnoker.github.io/iot-dc3/
site_author: pnoker
copyright: Copyright &copy; 2017-2026 pnoker. Licensed under AGPL-3.0.

repo_name: pnoker/iot-dc3
repo_url: https://github.com/pnoker/iot-dc3
edit_uri: edit/release/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  logo: assets/images/logo-blue.zh.png
  favicon: assets/images/logo-blue.zh.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 90%

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      permalink_title: 锚链接
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pnoker/iot-dc3
      name: GitHub
    - icon: fontawesome/brands/git-alt
      link: https://gitee.com/pnoker/iot-dc3
      name: Gitee

nav:
  - 首页: index.md
  - 快速开始:
      - quickstart/index.md
      - 环境变量: quickstart/environment.md
  - 使用指南:
      - guide/index.md
      - 镜像与部署: guide/usage.md
      - 日志规范: guide/logging.md
      - 故障排查: guide/troubleshooting.md
  - 架构:
      - architecture/index.md
      - 模块与依赖: architecture/modules.md
  - 开发:
      - development/index.md
      - 驱动开发: development/driver-authoring.md
      - 测试: development/testing.md
      - 变更日志: development/changelog.md
  - 模块: modules/index.md
  - 社区:
      - 贡献指南: community/contributing.md
      - 行为准则: community/code-of-conduct.md
      - 安全策略: community/security.md
