<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>IoT DC3 — 指令在体系中的位置</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;padding:2rem;color:#fff}.w{max-width:1100px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:1rem}.b{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:1rem;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:900px;display:block}</style></head>
<body><div class="w"><h1>指令 Command 在体系中的位置</h1><div class="b">
<svg viewBox="0 0 1040 440">
<defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>

<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter></defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<line x1="200" y1="215" x2="340" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="270" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">定义</text>
<line x1="550" y1="165" x2="680" y2="85" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="625" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">含</text>

<rect x="40" y="180" width="160" height="68" rx="8" fill="#0f172a"/><rect x="40" y="180" width="160" height="68" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="120" y="210" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">模板 Profile</text><text x="120" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">定义者</text>
<rect x="330" y="145" width="220" height="115" rx="12" fill="#22d3ee" opacity=".22" filter="url(#glow)"/>

<rect x="680" y="55" width="190" height="60" rx="8" fill="#0f172a"/><rect x="680" y="55" width="190" height="60" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="775" y="82" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">指令参数</text><text x="775" y="99" fill="#94a3b8" font-size="9" text-anchor="middle">CommandParam</text>

<rect x="680" y="330" width="190" height="62" rx="8" fill="#0f172a"/><rect x="680" y="330" width="190" height="62" rx="8" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="775" y="357" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">驱动 Driver</text><text x="775" y="374" fill="#94a3b8" font-size="9" text-anchor="middle">执行</text>
