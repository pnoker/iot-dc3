<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT DC3 — 模板的生命周期</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15,23,42,0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; }
    svg { width: 100%; min-width: 820px; display: block; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1rem; margin-top: 2rem; }
    .card { background: rgba(15,23,42,0.5); border-radius: 0.75rem; border: 1px solid #1e293b; padding: 1.25rem; }
    .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; }
    .card-dot.cyan { background: #22d3ee; } .card-dot.emerald { background: #34d399; } .card-dot.violet { background: #a78bfa; }
    .card h3 { font-size: 0.875rem; font-weight: 600; }
    .card ul { list-style: none; color: #94a3b8; font-size: 0.75rem; }
    .card li { margin-bottom: 0.375rem; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-left: auto; flex-shrink: 0; align-items: center; }
    .toolbar-toggle { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0.25rem 0.5rem; border-radius: 0.375rem; transition: color .2s, background .2s; }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30,41,59,0.5); }
    .toolbar-actions { display: none; gap: 0.5rem; }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button { background: rgba(30,41,59,0.8); border: 1px solid #334155; color: #94a3b8; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .toolbar-actions button:hover { background: rgba(51,65,85,0.8); color: white; border-color: #475569; }
    @media print { body { background: #020617; padding: 1rem; } .toolbar { display: none !important; } }
  </style>
</head>
<body>
  <div class="container" id="report-container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>模板的生命周期</h1>
        <div class="toolbar">
          <div class="toolbar-actions">
            <button onclick="copyAsImage(this)">📋 Copy</button>
            <button onclick="downloadPNG(this)">🖼️ PNG</button>
            <button onclick="downloadPDF(this)">📄 PDF</button>
          </div>
          <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export options" aria-label="Export options">⋯</button>
        </div>
      </div>
      <p class="subtitle">建模 → 复用 → 运行 → 演进：一份模板，多台设备复用，能力随 version 迭代</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 220">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- arrows (behind) -->
        <line x1="240" y1="125" x2="273" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="485" y1="125" x2="518" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="730" y1="125" x2="763" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- stage 1 建模 (cyan) -->
        <rect x="30" y="70" width="210" height="110" rx="8" fill="#0f172a"/>
        <rect x="30" y="70" width="210" height="110" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <circle cx="56" cy="96" r="13" fill="#22d3ee"/><text x="56" y="100" fill="#020617" font-size="13" font-weight="700" text-anchor="middle">1</text>
        <text x="146" y="100" fill="white" font-size="14" font-weight="600" text-anchor="middle">建模</text>
        <text x="135" y="132" fill="#94a3b8" font-size="9.5" text-anchor="middle">建 Profile</text>
        <text x="135" y="150" fill="#94a3b8" font-size="9.5" text-anchor="middle">加 Point / Command / Event</text>

        <!-- stage 2 复用 (emerald) -->
        <rect x="275" y="70" width="210" height="110" rx="8" fill="#0f172a"/>
        <rect x="275" y="70" width="210" height="110" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <circle cx="301" cy="96" r="13" fill="#34d399"/><text x="301" y="100" fill="#020617" font-size="13" font-weight="700" text-anchor="middle">2</text>
        <text x="391" y="100" fill="white" font-size="14" font-weight="600" text-anchor="middle">复用</text>
        <text x="380" y="132" fill="#94a3b8" font-size="9.5" text-anchor="middle">多个 Device</text>
        <text x="380" y="150" fill="#94a3b8" font-size="9.5" text-anchor="middle">绑定同一 profileId</text>

        <!-- stage 3 运行 (amber) -->
        <rect x="520" y="70" width="210" height="110" rx="8" fill="#0f172a"/>
        <rect x="520" y="70" width="210" height="110" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <circle cx="546" cy="96" r="13" fill="#fbbf24"/><text x="546" y="100" fill="#020617" font-size="13" font-weight="700" text-anchor="middle">3</text>
        <text x="636" y="100" fill="white" font-size="14" font-weight="600" text-anchor="middle">运行</text>
        <text x="625" y="132" fill="#94a3b8" font-size="9.5" text-anchor="middle">设备按模板</text>
        <text x="625" y="150" fill="#94a3b8" font-size="9.5" text-anchor="middle">采集 / 下令 / 上报</text>

        <!-- stage 4 演进 (violet) -->
        <rect x="765" y="70" width="210" height="110" rx="8" fill="#0f172a"/>
        <rect x="765" y="70" width="210" height="110" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <circle cx="791" cy="96" r="13" fill="#a78bfa"/><text x="791" y="100" fill="#020617" font-size="13" font-weight="700" text-anchor="middle">4</text>
        <text x="881" y="100" fill="white" font-size="14" font-weight="600" text-anchor="middle">演进</text>
        <text x="870" y="132" fill="#94a3b8" font-size="9.5" text-anchor="middle">改能力</text>
        <text x="870" y="150" fill="#94a3b8" font-size="9.5" text-anchor="middle">version 递增</text>
      </svg>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header"><div class="card-dot cyan"></div><h3>建模一次</h3></div>
        <ul><li>• 建 Profile 并补齐位号 / 指令 / 事件</li><li>• 定义即"这类设备的能力"</li></ul>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-dot emerald"></div><h3>大规模复用</h3></div>
        <ul><li>• 多台同型号设备绑定同一 profileId</li><li>• 改一处，全部生效</li></ul>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-dot violet"></div><h3>可演进</h3></div>
        <ul><li>• 运行期按模板采集 / 下令 / 上报</li><li>• 能力变更 → version 递增</li></ul>
      </div>
    </div>

    <p class="footer">IoT DC3 • 领域模型 · 模板生命周期</p>
  </div>

  <script>
    async function copyAsImage(btn){const orig=btn.textContent;try{const el=document.getElementById('report-container');const r=el.getBoundingClientRect();const pad=32;const canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:(e)=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2});const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);btn.textContent='✓ Copied!';}catch(e){btn.textContent='✗ Failed';}setTimeout(()=>btn.textContent=orig,2000);}
    async function downloadPNG(btn){const orig=btn.textContent;btn.textContent='⏳ ...';try{const el=document.getElementById('report-container');const r=el.getBoundingClientRect();const pad=32;const canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:(e)=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2});const link=document.createElement('a');link.download='profile-lifecycle.png';link.href=canvas.toDataURL('image/png');link.click();btn.textContent='✓ Done!';}catch(e){btn.textContent='✗ Failed';}setTimeout(()=>btn.textContent=orig,2000);}
    async function downloadPDF(btn){const orig=btn.textContent;btn.textContent='⏳ ...';try{const el=document.getElementById('report-container');const r=el.getBoundingClientRect();const pad=32;const canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:(e)=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2});const imgData=canvas.toDataURL('image/png');const {jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[canvas.width,canvas.height],hotfixes:['px_scaling']});pdf.addImage(imgData,'PNG',0,0,canvas.width,canvas.height);pdf.save('profile-lifecycle.pdf');btn.textContent='✓ Done!';}catch(e){btn.textContent='✗ Failed';}setTimeout(()=>btn.textContent=orig,2000);}
  </script>
</body>
</html>
