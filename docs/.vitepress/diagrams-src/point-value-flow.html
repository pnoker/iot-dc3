<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>IoT DC3 — 位号值数据管道</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;padding:2rem;color:#fff}.w{max-width:1160px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:1rem}.b{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:1rem;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:980px;display:block}</style></head>
<body><div class="w"><h1>位号值数据管道：采集 → 换算 → 落库 → 查询</h1><div class="b">
<svg viewBox="0 0 1100 400">
<defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="8"/></filter></defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<line x1="140" y1="185" x2="200" y2="182" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
<line x1="400" y1="182" x2="450" y2="182" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="425" y="174" fill="#94a3b8" font-size="9" text-anchor="middle">raw → cal → num</text>
<line x1="650" y1="182" x2="700" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
<line x1="900" y1="165" x2="960" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="930" y="156" fill="#94a3b8" font-size="9" text-anchor="middle">持久化</text>
<path d="M1030,265 Q1030,330 800,330" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="930" y="322" fill="#94a3b8" font-size="9" text-anchor="middle">latest / 聚合查询</text>
<rect x="30" y="160" width="110" height="55" rx="6" fill="#0f172a"/><rect x="30" y="160" width="110" height="55" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/><text x="85" y="184" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">设备</text><text x="85" y="201" fill="#94a3b8" font-size="9" text-anchor="middle">Device</text>
<rect x="200" y="150" width="200" height="65" rx="8" fill="#0f172a"/><rect x="200" y="150" width="200" height="65" rx="8" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="300" y="176" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">驱动</text><text x="300" y="194" fill="#94a3b8" font-size="9" text-anchor="middle">采集 + 换算</text>
<rect x="450" y="155" width="200" height="55" rx="6" fill="#0f172a"/><rect x="450" y="155" width="200" height="55" rx="6" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="550" y="178" fill="#fff" font-size="11.5" font-weight="600" text-anchor="middle">RabbitMQ</text><text x="550" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">位号值队列</text>
<rect x="700" y="145" width="200" height="70" rx="8" fill="#0f172a"/><rect x="700" y="145" width="200" height="70" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="800" y="172" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">数据中心</text><text x="800" y="190" fill="#94a3b8" font-size="9" text-anchor="middle">消费 + 落库</text>
<rect x="945" y="80" width="150" height="190" rx="14" fill="#a78bfa" opacity=".16" filter="url(#glow)"/>
<path d="M960,120 a65,14 0 0 0 120,0 v140 a65,14 0 0 1 -120,0 z" fill="#0f172a"/><path d="M960,120 a65,14 0 0 0 120,0 v140 a65,14 0 0 1 -120,0 z" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="2.5"/><ellipse cx="1020" cy="120" rx="65" ry="14" fill="none" stroke="#a78bfa" stroke-width="2.5"/><text x="1020" y="185" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">TimescaleDB</text><text x="1020" y="203" fill="#cbb6f7" font-size="9" text-anchor="middle">dc3_point_value</text>
<rect x="700" y="300" width="200" height="55" rx="8" fill="#0f172a"/><rect x="700" y="300" width="200" height="55" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="800" y="324" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">应用 / 看板</text><text x="800" y="341" fill="#94a3b8" font-size="9" text-anchor="middle">App / dashboard</text>
</svg></div></div></body></html>
