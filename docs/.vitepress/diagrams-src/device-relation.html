<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>IoT DC3 — 设备在体系中的位置</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;padding:2rem;color:#fff}.w{max-width:1140px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:1rem}.b{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:1rem;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:900px;display:block}</style></head>
<body><div class="w"><h1>设备 Device 在体系中的位置</h1><div class="b">
<svg viewBox="0 0 1100 460">
<defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter></defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<!-- edges -->
<line x1="210" y1="90" x2="400" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="300" y="135" fill="#94a3b8" font-size="9" text-anchor="middle">能力模型</text>
<line x1="210" y1="230" x2="400" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="305" y="222" fill="#94a3b8" font-size="9" text-anchor="middle">通信通道</text>
<line x1="210" y1="370" x2="400" y2="265" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="300" y="325" fill="#94a3b8" font-size="9" text-anchor="middle">隔离</text>
<line x1="620" y1="200" x2="760" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="700" y="145" fill="#94a3b8" font-size="9" text-anchor="middle">profileId 取得</text>
<line x1="620" y1="235" x2="760" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="690" y="227" fill="#94a3b8" font-size="9" text-anchor="middle">运行时产生</text>
<line x1="620" y1="265" x2="760" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="700" y="325" fill="#94a3b8" font-size="9" text-anchor="middle">主动上报</text>
<!-- left: Profile / Driver / Tenant -->
<rect x="40" y="60" width="170" height="62" rx="6" fill="#0f172a"/><rect x="40" y="60" width="170" height="62" rx="6" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="125" y="88" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">模板 Profile</text><text x="125" y="105" fill="#94a3b8" font-size="9" text-anchor="middle">能力模型</text>
<rect x="40" y="200" width="170" height="62" rx="6" fill="#0f172a"/><rect x="40" y="200" width="170" height="62" rx="6" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="125" y="228" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">驱动 Driver</text><text x="125" y="245" fill="#94a3b8" font-size="9" text-anchor="middle">通信通道</text>
<rect x="40" y="340" width="170" height="62" rx="6" fill="#0f172a"/><rect x="40" y="340" width="170" height="62" rx="6" fill="rgba(136,19,55,.4)" stroke="#fb7185" stroke-width="1.5"/><text x="125" y="368" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">租户 Tenant</text><text x="125" y="385" fill="#94a3b8" font-size="9" text-anchor="middle">数据隔离</text>
<!-- center: Device HERO slate -->
<rect x="390" y="150" width="230" height="110" rx="12" fill="#94a3b8" opacity=".2" filter="url(#glow)"/>
<rect x="400" y="160" width="210" height="90" rx="10" fill="#0f172a"/><rect x="400" y="160" width="210" height="90" rx="10" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="2.5"/><text x="505" y="195" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">设备 Device</text><text x="505" y="216" fill="#94a3b8" font-size="9.5" text-anchor="middle">现场设备的平台镜像</text><text x="505" y="232" fill="#94a3b8" font-size="9.5" text-anchor="middle">绑定 Profile + Driver</text>
<!-- right: Point / PointValue / Event -->
<rect x="760" y="80" width="180" height="60" rx="8" fill="#0f172a"/><rect x="760" y="80" width="180" height="60" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="850" y="106" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">位号 Point</text><text x="850" y="123" fill="#94a3b8" font-size="9" text-anchor="middle">采集 / 写入</text>
<path d="M760,195 a90,16 0 0 0 180,0 v80 a90,16 0 0 1 -180,0 z" fill="#0f172a"/><path d="M760,195 a90,16 0 0 0 180,0 v80 a90,16 0 0 1 -180,0 z" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/><ellipse cx="850" cy="195" rx="90" ry="16" fill="none" stroke="#a78bfa" stroke-width="1.5"/><text x="850" y="240" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">位号值 PointValue</text>
<rect x="760" y="330" width="180" height="60" rx="8" fill="#0f172a"/><rect x="760" y="330" width="180" height="60" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="850" y="356" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">事件 Event</text><text x="850" y="373" fill="#94a3b8" font-size="9" text-anchor="middle">主动上报</text>
</svg></div></div></body></html>
