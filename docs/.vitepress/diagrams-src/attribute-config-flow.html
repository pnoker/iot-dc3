<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>IoT DC3 — 属性配置流转</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;padding:2rem;color:#fff}.w{max-width:1180px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:1rem}.b{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:1rem;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:1000px;display:block}</style></head>
<body><div class="w"><h1>属性配置流转：声明 → 落库 → 填值 → 下发</h1><div class="b">
<svg viewBox="0 0 1180 340">
<defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern></defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<line x1="220" y1="155" x2="290" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="255" y="147" fill="#94a3b8" font-size="9" text-anchor="middle">驱动启动上报</text>
<line x1="520" y1="150" x2="560" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="540" y="142" fill="#94a3b8" font-size="9" text-anchor="middle">加载</text>
<line x1="780" y1="155" x2="830" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="805" y="147" fill="#94a3b8" font-size="9" text-anchor="middle">填值保存</text>
<line x1="940" y1="205" x2="940" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="1000" y="236" fill="#94a3b8" font-size="9" text-anchor="middle">运行时下发</text>
<rect x="20" y="120" width="200" height="70" rx="8" fill="#0f172a"/><rect x="20" y="120" width="200" height="70" rx="8" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1.5"/><text x="120" y="148" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">application.yml</text><text x="120" y="166" fill="#94a3b8" font-size="9" text-anchor="middle">属性定义</text>
<rect x="290" y="115" width="230" height="80" rx="8" fill="#0f172a"/><rect x="290" y="115" width="230" height="80" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="405" y="145" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">Manager 落库</text><text x="405" y="163" fill="#94a3b8" font-size="9" text-anchor="middle">Attribute 表</text><text x="405" y="180" fill="#94a3b8" font-size="9" text-anchor="middle">声明的 schema</text>
<rect x="560" y="120" width="220" height="70" rx="8" fill="#0f172a"/><rect x="560" y="120" width="220" height="70" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="670" y="148" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">配置矩阵</text><text x="670" y="166" fill="#94a3b8" font-size="9" text-anchor="middle">设备编辑页 · 列=Attribute</text>
<path d="M830,110 a100,16 0 0 0 200,0 v90 a100,16 0 0 1 -200,0 z" fill="#0f172a"/><path d="M830,110 a100,16 0 0 0 200,0 v90 a100,16 0 0 1 -200,0 z" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/><ellipse cx="930" cy="110" rx="100" ry="16" fill="none" stroke="#a78bfa" stroke-width="1.5"/><text x="930" y="160" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Config 表</text><text x="930" y="178" fill="#94a3b8" font-size="9" text-anchor="middle">configValue</text>
<rect x="830" y="260" width="220" height="60" rx="8" fill="#0f172a"/><rect x="830" y="260" width="220" height="60" rx="8" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="940" y="286" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">驱动组装协议报文</text><text x="940" y="303" fill="#94a3b8" font-size="9" text-anchor="middle">运行时使用</text>
</svg></div></div></body></html>
