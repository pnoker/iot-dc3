<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>IoT DC3 — 设备在线与租约</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;padding:2rem;color:#fff}.w{max-width:1100px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:1rem}.b{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:1rem;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:900px;display:block}</style></head>
<body><div class="w"><h1>设备在线判定：续租 + 扫描</h1><div class="b">
<svg viewBox="0 0 1000 360">
<defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter></defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<!-- top chain -->
<line x1="240" y1="90" x2="340" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="290" y="82" fill="#94a3b8" font-size="9" text-anchor="middle">续租</text>
<line x1="540" y1="90" x2="680" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="610" y="82" fill="#94a3b8" font-size="9" text-anchor="middle">upsert expire_time</text>
<!-- scanner -> state (two labels) -->
<line x1="580" y1="250" x2="800" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/><text x="720" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">查 expire_time ≤ now</text>
<line x1="460" y1="250" x2="740" y2="150" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah)"/><text x="560" y="232" fill="#fb7185" font-size="9" text-anchor="middle">过期 → 离线</text>
<!-- driver -->
<rect x="40" y="60" width="200" height="62" rx="6" fill="#0f172a"/><rect x="40" y="60" width="200" height="62" rx="6" fill="rgba(251,146,60,.3)" stroke="#fb923c" stroke-width="1.5"/><text x="140" y="88" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">驱动 DeviceHealth</text><text x="140" y="105" fill="#94a3b8" font-size="9" text-anchor="middle">周期心跳</text>
<!-- data center -->
<rect x="340" y="55" width="200" height="70" rx="8" fill="#0f172a"/><rect x="340" y="55" width="200" height="70" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="440" y="84" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">数据中心</text><text x="440" y="103" fill="#94a3b8" font-size="9" text-anchor="middle">DeviceStateDTO</text>
<!-- entity_state HERO cylinder -->
<rect x="660" y="35" width="240" height="130" rx="14" fill="#a78bfa" opacity=".18" filter="url(#glow)"/>
<path d="M690,60 a90,16 0 0 0 180,0 v90 a90,16 0 0 1 -180,0 z" fill="#0f172a"/><path d="M690,60 a90,16 0 0 0 180,0 v90 a90,16 0 0 1 -180,0 z" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="2"/><ellipse cx="780" cy="60" rx="90" ry="16" fill="none" stroke="#a78bfa" stroke-width="2"/><text x="780" y="108" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">dc3_entity_state</text><text x="780" y="126" fill="#cbb6f7" font-size="9" text-anchor="middle">expire_time · online/offline</text>
<!-- scanner -->
<rect x="340" y="225" width="240" height="62" rx="8" fill="#0f172a"/><rect x="340" y="225" width="240" height="62" rx="8" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1.5"/><text x="460" y="252" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">扫描器 device_scan</text><text x="460" y="270" fill="#94a3b8" font-size="9" text-anchor="middle">周期 tick</text>
</svg></div></div></body></html>
