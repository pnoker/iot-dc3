<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>IoT DC3 — 位号在体系中的位置</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'JetBrains Mono',monospace; background:#020617; padding:2rem; color:#fff; }
    .wrap { max-width:1100px; margin:0 auto; }
    h1 { font-size:1.4rem; margin-bottom:1rem; }
    .box { background:rgba(15,23,42,.5); border:1px solid #1e293b; border-radius:1rem; padding:1.5rem; overflow-x:auto; }
    svg { width:100%; min-width:860px; display:block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>位号 Point 在体系中的位置</h1>
    <div class="box">
      <svg viewBox="0 0 1000 420">
        <defs>
          <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>

        <!-- edges -->
        <line x1="190" y1="215" x2="240" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
        <text x="215" y="207" fill="#94a3b8" font-size="9" text-anchor="middle">归属</text>
        <line x1="410" y1="190" x2="500" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
        <text x="445" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">定义</text>
        <line x1="410" y1="230" x2="500" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
        <text x="455" y="227" fill="#94a3b8" font-size="9" text-anchor="middle">定义</text>
        <line x1="700" y1="115" x2="800" y2="195" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah)"/>
        <text x="772" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">point_id</text>
        <path d="M120,245 Q120,360 500,360 Q820,360 870,275" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
        <text x="430" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">运行态取值</text>

        <!-- device -->
        <rect x="50" y="185" width="140" height="62" rx="6" fill="#0f172a"/>
        <rect x="50" y="185" width="140" height="62" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="120" y="212" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">设备 Device</text>
        <text x="120" y="229" fill="#94a3b8" font-size="9" text-anchor="middle">设备实例</text>

        <!-- profile -->
        <rect x="240" y="180" width="170" height="70" rx="8" fill="#0f172a"/>
        <rect x="240" y="180" width="170" height="70" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="325" y="210" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">模板 Profile</text>
        <text x="325" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">归属根</text>

        <!-- point (HERO cyan) -->
        <rect x="490" y="40" width="210" height="90" rx="10" fill="#22d3ee" opacity=".22" filter="url(#glow)"/>
        <rect x="500" y="50" width="190" height="70" rx="8" fill="#0f172a"/>
        <rect x="500" y="50" width="190" height="70" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="2.5"/>
        <text x="595" y="80" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">位号 Point</text>
        <text x="595" y="100" fill="#94a3b8" font-size="9.5" text-anchor="middle">数据项 / 控制点</text>

        <!-- command -->
        <rect x="500" y="205" width="190" height="60" rx="8" fill="#0f172a"/>
        <rect x="500" y="205" width="190" height="60" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="595" y="231" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">指令 Command</text>
        <text x="595" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">兄弟能力</text>

        <!-- pointvalue (cylinder, violet) -->
        <path d="M800,170 a70,16 0 0 0 140,0 v110 a70,16 0 0 1 -140,0 z" fill="#0f172a"/>
        <path d="M800,170 a70,16 0 0 0 140,0 v110 a70,16 0 0 1 -140,0 z" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <ellipse cx="870" cy="170" rx="70" ry="16" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="870" y="225" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">位号值</text>
        <text x="870" y="243" fill="#94a3b8" font-size="9" text-anchor="middle">PointValue</text>
      </svg>
    </div>
  </div>
</body>
</html>
