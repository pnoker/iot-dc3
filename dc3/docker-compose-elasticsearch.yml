x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DC3_LOG_MAX_SIZE:-10M}
    max-file: "${DC3_LOG_MAX_FILE:-20}"

services:
  elasticsearch:
    image: pnoker/dc3-elasticsearch:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    environment:
      - "ES_JAVA_OPTS=${DC3_ES_JAVA_OPTS:--Xms512m -Xmx512m}"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    container_name: dc3-elasticsearch
    hostname: dc3-elasticsearch
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-elasticsearch

  logstash:
    image: pnoker/dc3-logstash:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    depends_on:
      - elasticsearch
    environment:
      - "LS_JAVA_OPTS=${DC3_LS_JAVA_OPTS:--Xms256m -Xmx256m}"
    container_name: dc3-logstash
    hostname: dc3-logstash
    volumes:
      - logs:/usr/share/logstash/dc3/logs
      - logstash:/usr/share/logstash/data
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-logstash

  kibana:
    image: pnoker/dc3-kibana:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    depends_on:
      - elasticsearch
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_KIBANA_PORT:-5601}:5601"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    container_name: dc3-kibana
    hostname: dc3-kibana
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-kibana

  apm:
    image: pnoker/dc3-apm:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    depends_on:
      - elasticsearch
    container_name: dc3-apm
    hostname: dc3-apm
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-apm

volumes:
  logs:
  elasticsearch:
  logstash:

networks:
  dc3net:
    driver: bridge
