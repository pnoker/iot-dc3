x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DC3_LOG_MAX_SIZE:-10M}
    max-file: "${DC3_LOG_MAX_FILE:-20}"

services:
  gateway:
    build:
      context: ../dc3-gateway/
      dockerfile: ./Dockerfile
    image: ${DC3_IMAGE_REGISTRY:-pnoker}/dc3-gateway:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_GATEWAY_PORT:-8000}:8000"
    environment:
      - NODE_ENV=test
      - APM_AGENT_ENABLE=${APM_AGENT_ENABLE:-false}
    container_name: dc3-gateway
    hostname: dc3-gateway
    volumes:
      - logs:/dc3-gateway/dc3/logs
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-gateway

  auth:
    build:
      context: ../dc3-center/dc3-center-auth/
      dockerfile: ./Dockerfile
    image: ${DC3_IMAGE_REGISTRY:-pnoker}/dc3-center-auth:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_AUTH_PORT:-8300}:8300"
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_AUTH_GRPC_PORT:-9300}:9300"
    environment:
      - NODE_ENV=test
      - APM_AGENT_ENABLE=${APM_AGENT_ENABLE:-false}
    container_name: dc3-center-auth
    hostname: dc3-center-auth
    volumes:
      - logs:/dc3-center/dc3-center-auth/dc3/logs
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-center-auth

  manager:
    build:
      context: ../dc3-center/dc3-center-manager/
      dockerfile: ./Dockerfile
    image: ${DC3_IMAGE_REGISTRY:-pnoker}/dc3-center-manager:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_MANAGER_PORT:-8400}:8400"
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_MANAGER_GRPC_PORT:-9400}:9400"
    environment:
      - NODE_ENV=test
      - APM_AGENT_ENABLE=${APM_AGENT_ENABLE:-false}
    container_name: dc3-center-manager
    hostname: dc3-center-manager
    volumes:
      - logs:/dc3-center/dc3-center-manager/dc3/logs
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-center-manager

  data:
    build:
      context: ../dc3-center/dc3-center-data/
      dockerfile: ./Dockerfile
    image: ${DC3_IMAGE_REGISTRY:-pnoker}/dc3-center-data:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_DATA_PORT:-8500}:8500"
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_DATA_GRPC_PORT:-9500}:9500"
    environment:
      - NODE_ENV=test
      - APM_AGENT_ENABLE=${APM_AGENT_ENABLE:-false}
    container_name: dc3-center-data
    hostname: dc3-center-data
    volumes:
      - logs:/dc3-center/dc3-center-data/dc3/logs
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-center-data

  agentic:
    build:
      context: ../dc3-center/dc3-center-agentic/
      dockerfile: ./Dockerfile
    image: ${DC3_IMAGE_REGISTRY:-pnoker}/dc3-center-agentic:${DC3_IMAGE_TAG:-2026.5}
    restart: always
    ports:
      - "${DC3_BIND_HOST:-127.0.0.1}:${DC3_AGENTIC_PORT:-8600}:8600"
    environment:
      - NODE_ENV=test
      - APM_AGENT_ENABLE=${APM_AGENT_ENABLE:-false}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-2048}
    container_name: dc3-center-agentic
    hostname: dc3-center-agentic
    volumes:
      - logs:/dc3-center/dc3-center-agentic/dc3/logs
    logging: *default-logging
    networks:
      dc3net:
        aliases:
          - dc3-center-agentic

  listening-virtual:
